<!DOCTYPE html>
<html lang="lo">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ST POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{--tiff:#0ABAB5;--tiff2:#13C7C1;--tiff-lite:#5FD9D2;--tiff-deep:#0A7E7A;--tiff-ink:#075A57;
 --grad:linear-gradient(135deg,#0ABAB5 0%,#16C6C0 55%,#5FD9D2 100%);--grad-deep:linear-gradient(135deg,#0A7E7A,#0ABAB5);
 --green:#16a34a;--pink:#ec4899;--orange:#f97316;--blue:#3b82f6;--red:#ef4444;--gold:#f4b740;
 --bg:#f3fbfb;--card:#fff;--line:#dbeeed;--text:#0f2e2c;--muted:#5b7d7b;--free:#16a34a;--busy:#f59e0b;--bill:#3b82f6;--new:#ec4899;--merge:#0ABAB5;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans Lao','Roboto',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);overflow:hidden}button{cursor:pointer;border:none;font-family:inherit}.hidden{display:none!important}
#app{display:flex;height:100vh;width:100vw}
#sidebar{width:228px;background:#fff;border-right:1px solid var(--line);flex-shrink:0;display:flex;flex-direction:column;overflow:auto}
.brand{background:var(--grad);color:#fff;padding:16px 14px;display:flex;align-items:center;gap:11px}
.brand .logo{width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
.brand b{font-size:20px;display:block;line-height:1;letter-spacing:.5px}.brand small{font-size:10px;opacity:.9}
.navsec{padding:13px 16px 4px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.navitem{display:flex;align-items:center;gap:11px;padding:11px 16px;color:var(--text);font-size:14px;background:none;width:100%;text-align:left;font-weight:500}
.navitem:hover{background:#eafbfa}.navitem.active{background:#dff7f5;color:var(--tiff-deep);font-weight:700;border-left:4px solid var(--tiff)}
.navitem .ic{font-size:17px}.live{margin-left:auto;background:#ef4444;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:11px 22px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 8px rgba(10,186,181,.06)}
.topbar h1{font-size:20px;font-weight:900;flex:1;text-align:center;background:var(--grad-deep);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ordno{background:var(--grad);color:#fff;min-width:42px;height:42px;padding:0 6px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800}
#viewRoot{flex:1;overflow:auto;display:flex;flex-direction:column}.pad{padding:18px}
.tv-head{display:flex;align-items:center;gap:12px;margin-bottom:13px;flex-wrap:wrap}.tv-head .ttl{font-size:20px;font-weight:800}.tv-head .sub{color:var(--muted);font-size:12px}
.floors{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:7px 16px;border-radius:20px;background:#fff;border:1px solid var(--line);font-size:13px;font-weight:600}
.chip.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(10,186,181,.3)}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;background:#fff;padding:12px 16px;border-radius:14px;box-shadow:0 2px 10px rgba(10,186,181,.06)}
.legend span{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}.dot{width:12px;height:12px;border-radius:50%}
.outstanding{background:linear-gradient(135deg,#fff7e6,#fef0c7);border:1px solid #f5d488;border-radius:14px;padding:12px 16px;margin-bottom:15px;font-size:14px;font-weight:700;color:#92710e}
.tablegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px}
.tablecard{background:#fff;border-radius:16px;padding:15px 8px;text-align:center;border:2px solid var(--line);position:relative;transition:.14s;box-shadow:0 2px 8px rgba(10,186,181,.05)}
.tablecard:hover{transform:translateY(-3px);box-shadow:0 10px 22px rgba(10,186,181,.18)}
.tablecard .tname{font-weight:800;font-size:15px;margin-top:4px}.tablecard .tseat{font-size:25px}.tablecard .tamt{font-size:11px;color:var(--muted);margin-top:3px}
.s-free{border-color:var(--free)}.s-busy{border-color:var(--busy);background:#fffbeb}.s-bill{border-color:var(--bill);background:#eff6ff}
.s-new{border-color:var(--new);background:#fdf2f8}.s-main{border-color:var(--tiff);background:#eafbfa}.s-merged{border-color:var(--tiff-lite);opacity:.55}
.qrbadge{position:absolute;top:6px;right:7px;background:#dff7f5;border-radius:9px;width:29px;height:29px;display:flex;align-items:center;justify-content:center;z-index:2;transition:.12s}.qrbadge:hover{background:var(--tiff);transform:scale(1.12)}
#orderWrap{flex:1;display:flex;overflow:hidden}.menupane{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:13px}
.cats{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap}.cat{padding:8px 17px;border-radius:11px;background:#fff;border:1px solid var(--line);font-weight:700;font-size:13px}
.cat.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(10,186,181,.3)}
.subcats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px;align-items:center}.subcat{padding:5px 12px;border-radius:16px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:600}
.subcat.active{background:var(--tiff-deep);color:#fff;border-color:transparent}
.dttoggle{margin-left:auto;display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}.dttoggle button{padding:6px 13px;font-size:12px;font-weight:700;background:#fff}.dttoggle button.on{background:var(--tiff);color:#fff}
.searchbox input{padding:7px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;width:150px;margin-left:8px}
.products{flex:1;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:8px;align-content:start}
.product{background:#fff;border-radius:10px;border:1px solid var(--line);position:relative;transition:.14s;box-shadow:0 1px 5px rgba(10,186,181,.05);padding:8px;display:flex;flex-direction:column;gap:5px;cursor:pointer;min-height:58px}
.product:hover{transform:translateY(-3px);box-shadow:0 10px 20px rgba(10,186,181,.16)}
.product .thumb{height:60px;border-radius:8px;background:linear-gradient(135deg,#d5f6f4,#eafbfa);overflow:hidden;display:flex;align-items:center;justify-content:center}
.product .thumb img{width:100%;height:100%;object-fit:cover}
.product .pname{font-size:12px;font-weight:700;line-height:1.25;color:var(--text);flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product .ptop{display:flex;align-items:center;justify-content:space-between;gap:6px}
.product .price{background:var(--grad);color:#fff;font-size:12px;font-weight:800;padding:2px 8px;border-radius:8px;white-space:nowrap}
.product .code{font-size:10px;color:var(--muted);font-weight:600}
.product.lowstk{outline:2px solid var(--red)}
.cart{width:372px;flex-shrink:0;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column}
.cart-top{background:var(--grad);padding:12px;display:flex;gap:9px}.cart-top button{flex:1;padding:11px;border-radius:11px;font-weight:700;font-size:13px;background:rgba(255,255,255,.25);color:#fff}
.cart-items{flex:1;overflow:auto;padding:8px 12px}.citem{border-bottom:1px solid var(--line);padding:9px 0;display:flex;gap:8px}
.citem .ci-main{flex:1}.citem .ci-name{font-size:13px;font-weight:700}.citem .ci-mod{font-size:11px;color:var(--pink);margin-top:2px}
.citem .ci-ctrls{display:flex;align-items:center;gap:7px;margin-top:5px}.qbtn{width:25px;height:25px;border-radius:50%;background:#eafbfa;font-size:15px;font-weight:700;color:var(--tiff-deep)}.qbtn:hover{background:#cdefed}
.miniic{background:none;font-size:14px}.citem .ci-right{text-align:right;font-weight:800;font-size:13px}.trash{color:#ef4444;background:none;font-size:15px}
.cart-empty{text-align:center;color:var(--muted);padding:38px 0;font-size:14px}.cart-foot{border-top:1px solid var(--line);padding:12px}
.totrow{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin:3px 0}.totrow.grand{font-size:20px;font-weight:900;color:var(--text);margin-top:5px}
.lnk{color:var(--tiff-deep);font-weight:600;cursor:pointer;font-size:12px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}.actions button{padding:11px;border-radius:11px;color:#fff;font-weight:700;font-size:13px}
.b-bill{background:var(--tiff-deep)}.b-pay{background:var(--green)}.b-split{background:var(--tiff)}.b-move{background:var(--pink)}.b-merge{background:var(--blue)}.b-cancel{background:var(--orange)}
.confirm{width:100%;padding:15px;border-radius:13px;background:var(--grad);color:#fff;font-weight:800;font-size:16px;margin-top:8px;box-shadow:0 5px 16px rgba(10,186,181,.35)}
.overlay{position:fixed;inset:0;background:rgba(7,46,44,.45);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:18px;padding:22px;width:420px;max-width:92vw;max-height:88vh;overflow:auto;box-shadow:0 24px 60px rgba(7,46,44,.3);animation:pop .18s ease}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-size:19px;margin-bottom:12px;text-align:center}.modal h3{font-size:14px;margin:12px 0 6px;color:var(--muted)}
.modal label{display:block;font-size:13px;margin:8px 0 3px;font-weight:600}.modal input,.modal select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-size:14px}
.optrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}.opt{padding:7px 13px;border:1px solid var(--line);border-radius:20px;font-size:13px;background:#fff}.opt.sel{background:var(--tiff);color:#fff;border-color:transparent}
.modal-btns{display:flex;gap:10px;margin-top:16px}.modal-btns button{flex:1;padding:11px;border-radius:11px;font-weight:700;font-size:15px}
.btn-ok{background:var(--tiff);color:#fff}.btn-ok.grad{background:var(--grad)}.btn-cancel{background:#e7f3f2;color:var(--tiff-ink)}.btn-ok.green{background:var(--green)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}.numpad button{padding:14px;font-size:16px;font-weight:700;background:#eafbfa;border-radius:11px;color:var(--tiff-deep)}
.paysummary{background:#f3fbfb;border-radius:12px;padding:12px;font-size:14px}.paysummary .row{display:flex;justify-content:space-between;margin:4px 0}.paysummary .change{font-size:18px;font-weight:900;color:var(--green)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f2e2c;color:#fff;padding:11px 20px;border-radius:11px;font-size:14px;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:80vw}
.tableselect{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;max-height:280px;overflow:auto}.tableselect .ts{padding:11px 4px;border:1px solid var(--line);border-radius:11px;text-align:center;font-weight:600;font-size:12px}
.ts.free{border-color:var(--free)}.ts.busy{background:#fffbeb;border-color:var(--busy)}
.paytype{display:flex;gap:7px;margin:9px 0;flex-wrap:wrap}.paytype .pt{flex:1;min-width:92px;padding:10px;border:1px solid var(--line);border-radius:11px;text-align:center;font-weight:600;font-size:12px}.paytype .pt.sel{background:var(--green);color:#fff;border-color:transparent}
.billline{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px dashed var(--line)}
.kds-head{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--grad);color:#fff;flex-wrap:wrap}
.kds-head .stat{background:rgba(255,255,255,.2);border-radius:11px;padding:6px 13px;font-size:13px;font-weight:700;cursor:pointer}.kds-head .stat.on{background:#fff;color:var(--tiff-deep)}
.kds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:13px;padding:16px}
.kcard{background:#fff;border-radius:14px;border-left:5px solid var(--busy);padding:13px;box-shadow:0 3px 12px rgba(10,186,181,.08)}
.kcard.st-wait{border-color:var(--muted)}.kcard.st-cooking{border-color:var(--orange)}.kcard.st-ready{border-color:var(--green)}
.kcard h4{font-size:15px;margin-bottom:4px}.kcard .meta{font-size:12px;color:var(--muted);margin-bottom:8px}.kcard .kbtn{width:100%;padding:9px;border-radius:9px;color:#fff;font-weight:700;font-size:13px;margin-top:6px}
.empty{text-align:center;color:var(--muted);padding:50px;font-size:15px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;padding:18px}
.kpi{background:#fff;border-radius:16px;padding:17px;box-shadow:0 3px 12px rgba(10,186,181,.08)}.kpi .lbl{font-size:13px;color:var(--muted)}.kpi .val{font-size:25px;font-weight:900;margin-top:4px}.kpi .sub{font-size:12px;color:var(--muted);margin-top:3px}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}table.tbl th{background:var(--tiff-deep);color:#fff;padding:9px;text-align:left;position:sticky;top:0}table.tbl td{padding:8px 9px;border-bottom:1px solid var(--line)}table.tbl tr:hover{background:#f3fbfb}
.tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}.tag.ok{background:#dcfce7;color:#166534}.tag.warn{background:#fee2e2;color:#991b1b}
.btn-sm{padding:5px 11px;border-radius:8px;background:var(--tiff);color:#fff;font-size:12px;font-weight:700}.btn-sm.red{background:var(--red)}
.toolbar{display:flex;gap:8px;padding:14px 18px;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;background:#eafbfa;border:1px solid var(--line);border-radius:20px;padding:5px 8px 5px 13px;font-size:13px;font-weight:600;margin:3px}
.pill button{background:var(--red);color:#fff;width:20px;height:20px;border-radius:50%;font-size:12px;line-height:1}
.modal.success{text-align:center;width:330px}.checkwrap{width:84px;height:84px;margin:4px auto 12px;border-radius:50%;background:#eafbfa;display:flex;align-items:center;justify-content:center}.checkwrap svg{width:60px;height:60px}
.checkwrap circle{fill:none;stroke:var(--tiff);stroke-width:3;stroke-dasharray:151;stroke-dashoffset:151;animation:dash .5s ease forwards}
.checkwrap path{fill:none;stroke:var(--green);stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:48;stroke-dashoffset:48;animation:dash .4s .35s ease forwards}
@keyframes dash{to{stroke-dashoffset:0}}.modal.success h2{color:var(--tiff-deep)}.ssub{color:var(--muted);font-size:14px;margin-top:-4px}
.bootscreen{position:fixed;inset:0;background:var(--grad);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:500;gap:14px}.bootscreen .lg{font-size:46px;font-weight:900;letter-spacing:1px}
.spin{width:40px;height:40px;border:4px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.adminbox{max-width:820px;padding:18px}
/* ===== THERMAL RECEIPT ===== */
#printArea{display:none}
.rcpt{font-family:'Noto Sans Lao','Phetsarath OT',monospace;color:#000;background:#fff;width:72mm;padding:3mm 2mm;box-sizing:border-box;font-size:12px;line-height:1.45}
.rcpt.w58{width:50mm;font-size:11px}
.rcpt .ctr{text-align:center}
.rcpt .logo{max-width:34mm;max-height:22mm;margin:0 auto 3px;display:block}
.rcpt .lgtxt{font-size:22px;font-weight:900;letter-spacing:1px;margin-bottom:2px}
.rcpt .shop{font-weight:700;font-size:13px}
.rcpt .sm{font-size:10.5px;line-height:1.3}
.rcpt .ttl{font-weight:700;margin:5px 0;font-size:13px;text-align:center}
.rcpt .dash{border-top:1px dashed #000;margin:4px 0}
.rcpt .meta{font-size:10.5px;display:flex;justify-content:space-between}
.rcpt .it{margin:3px 0}
.rcpt .it .nm{font-weight:600}
.rcpt .it .ln{display:flex;justify-content:space-between;font-size:11px}
.rcpt .it .ln .q{color:#000}
.rcpt .row{display:flex;justify-content:space-between}
.rcpt .grand{font-weight:900;font-size:15px}
.rcpt .cur{font-size:11px;display:flex;justify-content:space-between}
.rcpt .foot{text-align:center;font-size:10.5px;margin-top:6px}
.rcpt-prev{border:1px solid #e2e8f0;border-radius:10px;background:#fff;display:inline-block;margin:0 auto}
@media print{
  body *{visibility:hidden!important}
  #printArea,#printArea *{visibility:visible!important}
  #printArea{display:block!important;position:absolute;left:0;top:0;width:100%}
  .rcpt{width:72mm}
  .rcpt.w58{width:50mm}
  @page{margin:0}
}
</style>
</head>
<body>
<div id="boot" class="bootscreen"><div class="lg">ST POS</div><div class="spin"></div><div style="font-size:13px;opacity:.9">ກຳລັງໂຫຼດ...</div></div>
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="brand"><div class="logo">ST</div><div><b>ST POS</b><small>Smart Restaurant POS</small></div></div>
    <div class="navsec">POS / ຂາຍ</div>
    <button class="navitem" data-v="tables"><span class="ic"></span> ສັ່ງອາຫານ <span class="live">LIVE</span></button>
    <button class="navitem" data-v="kitchen"><span class="ic"></span> ຈໍຄົວ</button>
    <button class="navitem" data-v="bar"><span class="ic"></span> ຈໍບາຣ໌ນ້ຳ</button>
    <button class="navitem" data-v="waiter"><span class="ic"></span> ຈໍພະນັກງານເສີບ</button>
    <button class="navitem" data-v="history"><span class="ic"></span> ປະຫວັດການຂາຍ</button>
    <div class="navsec">ຈັດການ</div>
    <button class="navitem" data-v="dash"><span class="ic"></span> Dashboard</button>
    <button class="navitem" data-v="stock"><span class="ic"></span> ສະຕ໋ອກວັດຖຸດິບ</button>
    <button class="navitem" data-v="admin"><span class="ic"></span> ຕັ້ງຄ່າ / Admin</button>
  </aside>
  <div id="main">
    <div class="topbar"><button onclick="setView('tables')" style="background:none;font-size:21px"></button>
      <h1>ST POS</h1><div class="ordno" id="ordNo">1</div><span style="font-size:24px"></span></div>
    <div id="viewRoot"></div>
  </div>
</div>
<div id="modalRoot"></div><div id="toastRoot"></div><div id="printArea"></div>
<script>
const KIP=n=>Math.round(Number(n)||0).toLocaleString('en-US');
const MENU={"ເຄື່ອງດື່ມ":{"ທົ່ວໄປ":[{c:"BEV001",n:"Iced Lemon Tea",p:55000,k:"drink",bom:[["TEA",50],["CUP",1]]}]},"ອາຫານ":{"ທົ່ວໄປ":[{c:"FOOD001",n:"ເຂົ້າຜັດ",p:75000,k:"food",bom:[["RICE",250]]}]}};
const MOD_GROUPS=[{title:"ຄວາມຫວານ",multi:false,opts:["0%","50%","100%"]}];
const ING_DEF={TEA:["ຊາ","g"],CUP:["ຈອກ","ອັນ"],RICE:["ເຂົ້າ","g"]};
const DEFAULT_FLOORS=["ຊັ້ນ1","ຊັ້ນ2","ຊັ້ນ3","ດ້ານໜ້າຮ້ານ"];
const DEFAULT_TABLES=["A1","A2","A3","A4","A5","A6","A7","A8","B1","B2","B3","B4","C1","C2","C3","Bar1","Bar2","Bar3","LB1","LB2","ປະທານ","ມາດາມ ກູດ","ແປມ","ຕ່າວ"];
const PAYTYPES=["ເງິນສົດ","ໂອນ BCEL","ໂອນ LDB","ໂອນ LDB(VISA)","ກະເປົາລູກຄ້າ"];
const PIECE_ING=['CUP','STRAW','EGG','CROISSANT','CAKE','BEERLAO','HEINEKEN'];

let state=null,view='tables',curFloor="ທັງໝົດ",kfilter='all',dashDate=null;
let _kdsCount={},_kdsInit={};let stockCat='ທັງໝົດ';

function addIngredient(){openModal(`<h2> ເພີ່ມວັດຖຸດິບໃໝ່</h2><label>ລະຫັດ (ຫ້າມຊ້ຳ)</label><input id="ic" placeholder="ເຊັ່ນ HONEY"><label>ຊື່</label><input id="inm" placeholder="ນ້ຳເຜິ້ງ"><label>ຫົວໜ່ວຍ</label><input id="iu" value="g"><label>ສະຕ໋ອກເລີ່ມຕົ້ນ</label><input id="ist" type="number" value="1000"><label>ຈຸດສັ່ງຊື້</label><input id="ir" type="number" value="200"><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button><button class="btn-ok green" onclick="doAddIngredient()">ເພີ່ມ</button></div>`);}

 state.ingredients[c]={code:c,name:document.getElementById('inm').value||c,unit:document.getElementById('iu').value||'g',stock:+document.getElementById('ist').value||0,reorder:+document.getElementById('ir').value||0};save();closeModal();render();showSuccess('ເພີ່ມວັດຖຸດິບສຳເລັດ!',c);}

function openImport(){openModal(`<h2> ນຳເຂົ້າ Excel</h2><p style="font-size:13px;color:var(--muted);margin-bottom:6px">ເລືອກໄຟລ໌ "ST POS - Data.xlsx" — ດຶງ ເມນູ + ລາຄາ + ສູດຕັດສະຕ໋ອກ + ວັດຖຸດິບ ໂດຍອັດຕະໂນມັດ (ຕັດຕາມລະຫັດ FING/ING)</p><input type="file" id="xlf" accept=".xlsx,.xls"><div id="improg" style="font-size:13px;margin-top:10px;font-weight:700;color:var(--tiff-deep)"></div><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button><button class="btn-ok grad" onclick="doImport()">ນຳເຂົ້າ</button></div>`);}
function doImport(){var f=document.getElementById('xlf').files[0];if(!f){toast('ເລືອກໄຟລ໌ກ່ອນ');return;}var prog=document.getElementById('improg');prog.textContent='ກຳລັງໂຫຼດ library...';loadXLSX(function(err){if(err){prog.textContent='ໂຫຼດ library ບໍ່ໄດ້ (ກວດອິນເຕີເນັດ)';return;}prog.textContent='ກຳລັງອ່ານ...';var r=new FileReader();r.onload=function(){try{var wb=XLSX.read(new Uint8Array(r.result),{type:'array'});var res=parseWB(wb);if(!res.menuCount){prog.textContent='ບໍ່ພົບເມນູ — ກວດໂຄງສ້າງໄຟລ໌';return;}applyCatalog(res);closeModal();render();showSuccess('ນຳເຂົ້າສຳເລັດ!','ເມນູ '+res.menuCount+' · ວັດຖຸດິບ '+res.ingCount+' · ສູດ '+res.recipeCount);}catch(e){prog.textContent='ຜິດພາດ: '+(e&&e.message||e);}};r.readAsArrayBuffer(f);});}
function parseWB(wb){function rows(n){var ws=wb.Sheets[n];return ws?XLSX.utils.sheet_to_json(ws,{header:1,defval:null,blankrows:false}):[];}
 var ing={};[['ວັດຖຸດິບ','ວັດຖຸດິບ'],['ສິນຄ້າ','ສິນຄ້າ'],['ເຄື່ອງໃຊ້','ເຄື່ອງໃຊ້']].forEach(function(cf){var rs=rows(cf[0]);for(var i=1;i<rs.length;i++){var r=rs[i];if(!r)continue;var code=(r[0]==null?'':String(r[0])).trim();if(!code||/ລະຫັດ/.test(code))continue;var nm=(r[1]==null?code:String(r[1])).trim()||code;var unit=(r[2]==null?'':String(r[2])).trim()||'ອັນ';var st=Number(r[3]);if(isNaN(st))st=0;var ro=Number(r[4])||0;ing[code]={code:code,name:nm,unit:unit,stock:st,reorder:ro,cat:cf[1]};}});
 function sht(ns){for(var j=0;j<ns.length;j++){if(wb.Sheets[ns[j]])return rows(ns[j]);}return [];}
 var rec={};var rsr=sht(['ສູດຕັດສະຕ໋ອກ','Recipe','ສູດ']);for(var i=1;i<rsr.length;i++){var r=rsr[i];if(!r)continue;var mc=(r[0]==null?'':String(r[0])).trim();var ic=(r[1]==null?'':String(r[1])).trim();if(!mc||!ic||/ລະຫັດ/.test(mc))continue;var q=Number(r[2])||0;if(q<=0)continue;if(!rec[mc])rec[mc]=[];rec[mc].push([ic,q]);}
 var grouped={},menuCount=0,seen={};var rm=sht(['ເມນູ','Menu']);for(var i=1;i<rm.length;i++){var r=rm[i];if(!r)continue;var code=(r[0]==null?'':String(r[0])).trim();if(!code||seen[code]||/ລະຫັດ/.test(code))continue;var p=Number(r[5]);if(!p||isNaN(p))continue;seen[code]=1;var nm=(r[1]==null?code:String(r[1])).trim()||code;var main=(r[2]==null?'ອື່ນໆ':String(r[2])).trim()||'ອື່ນໆ';var sub=(r[3]==null?main:String(r[3])).trim()||main;var k=(r[4]==null?'food':String(r[4])).trim().toLowerCase()||'food';if(k!=='food'&&k!=='drink')k='food';if(!grouped[main])grouped[main]={};if(!grouped[main][sub])grouped[main][sub]=[];grouped[main][sub].push({c:code,n:nm,p:p,k:k,bom:rec[code]||[]});menuCount++;}
 return {grouped:grouped,ing:ing,menuCount:menuCount,ingCount:Object.keys(ing).length,recipeCount:Object.keys(rec).length};}
function applyCatalog(res){state.catalog=res.grouped;Object.keys(res.ing).forEach(function(code){var ex=state.ingredients[code];if(ex){ex.name=res.ing[code].name;ex.unit=res.ing[code].unit;ex.reorder=res.ing[code].reorder;}else{state.ingredients[code]=res.ing[code];}});var keys=Object.keys(state.catalog);if(keys.length){state.activeCat=keys[0];state.activeSub=null;}save();}

    <select id="ad_paper"><option value="80" ${(+state.paperW===80)?'selected':''}>80mm (ໃຫຍ່)</option><option value="58" ${(+state.paperW===58)?'selected':''}>58mm (ນ້ອຍ)</option></select>
    <div style="margin-top:12px"><button class="btn-ok grad" style="padding:10px 18px;border-radius:11px;font-weight:700" onclick="saveReceiptSettings()"> ບັນທຶກໃບບິນ</button><button class="btn-sm" style="margin-left:8px" onclick="testPrint()"> ທົດລອງພິມ</button></div></div>

  <div class="kpi" style="margin-bottom:14px"><div class="lbl" style="font-weight:700;margin-bottom:8px"> ຈັດການຊັ້ນ</div>
    <div>${state.floors.map(f=>`<span class="pill">${f}<button onclick="removeFloor('${f.replace(/'/g,"\\'")}')">×</button></span>`).join('')||'<span style="color:#94a3b8">ບໍ່ມີຊັ້ນ</span>'}</div>
    <button class="btn-sm" style="margin-top:8px" onclick="addFloor()"> ເພີ່ມຊັ້ນ</button></div>

  <div class="kpi" style="margin-bottom:14px"><div class="lbl" style="font-weight:700;margin-bottom:8px"> ຈັດການໂຕະ</div>
    <button class="btn-sm" onclick="addTablePrompt()"> ເພີ່ມໂຕະ</button>
    <div style="margin-top:8px;max-height:200px;overflow:auto">${Object.values(state.tables).map(t=>`<span class="pill">${t.name} <small style="color:var(--muted)">(${t.floor})</small><button onclick="removeTable('${t.name.replace(/'/g,"\\'")}')">×</button></span>`).join('')}</div></div>

  <div class="kpi" style="margin-bottom:14px"><div class="lbl" style="font-weight:700;margin-bottom:8px"> ຮູບເມນູ (ໃສ່ລິ້ງ URL · ແນະນຳ 400×400px)</div>
    <div style="max-height:240px;overflow:auto"><table class="tbl"><thead><tr><th>ລະຫັດ</th><th>ຊື່</th><th>ຮູບ</th><th></th></tr></thead><tbody>
     ${allMenu().map(p=>`<tr><td>${p.c}</td><td>${p.n}</td><td>${state.menuImg[p.c]?'<span class="tag ok">ມີຮູບ</span>':'<span style="color:#94a3b8">emoji</span>'}</td><td><button class="btn-sm" onclick="setMenuImage('${p.c}')">ປ່ຽນຮູບ</button></td></tr>`).join('')}</tbody></table></div></div>

  <div class="kpi" style="margin-bottom:14px"><div class="kpi" style="margin-bottom:14px"><div class="lbl" style="font-weight:700;margin-bottom:8px"> ນຳເຂົ້າຂໍ້ມູນ (Excel)</div><p style="font-size:13px;color:var(--muted);margin-bottom:8px">ອັບໂຫລດໄຟລ໌ ST POS - Data.xlsx — ດຶງ ເມນູ + ລາຄາ + ສູດຕັດສະຕ໋ອກ + ວັດຖຸດິບ. ສະຕ໋ອກເລີ່ມຕົ້ນ = 0 (ໄປຮັບເຂົ້າທີ່ໜ້າສະຕ໋ອກ)</p><button class="btn-ok grad" style="padding:10px 18px;border-radius:11px;font-weight:700" onclick="openImport()"> ເລືອກໄຟລ໌ Excel</button><p style="font-size:12px;color:var(--muted);margin-top:8px">ສະຖານະ: ${state.catalog?('ນຳເຂົ້າແລ້ວ '+allMenu().length+' ເມນູ'):'ຍັງໃຊ້ເມນູຕົວຢ່າງ'}</p></div>
   <div class="kpi" style="margin-bottom:14px"><div class="lbl" style="font-weight:700;margin-bottom:8px"> ກະ ແລະ ພະນັກງານ</div>
    <label>ກະປະຈຸບັນ</label><select id="ad_shift" onchange="state.activeShift=this.value;save()">${state.shifts.map(s=>`<option ${s===state.activeShift?'selected':''}>${s}</option>`).join('')}</select>
    <div style="margin-top:6px">${state.shifts.map(s=>`<span class="pill">${s}<button onclick="removeShift('${s.replace(/'/g,"\\'")}')">×</button></span>`).join('')}</div>
    <button class="btn-sm" style="margin-top:6px" onclick="addShift()"> ເພີ່ມກະ</button>
    <label style="margin-top:12px">ພະນັກງານກະປະຈຸບັນ</label><select id="ad_staff" onchange="state.activeStaff=this.value;save()">${state.staff.map(s=>`<option ${s===state.activeStaff?'selected':''}>${s}</option>`).join('')}</select>
    <div style="margin-top:6px">${state.staff.map(s=>`<span class="pill">${s}<button onclick="removeStaff('${s.replace(/'/g,"\\'")}')">×</button></span>`).join('')}</div>
    <button class="btn-sm" style="margin-top:6px" onclick="addStaff()"> ເພີ່ມພະນັກງານ</button>
    <p style="font-size:12px;color:var(--muted);margin-top:8px">ບິນຈະບັນທຶກເປັນ: <b>${state.activeShift} - ${state.activeStaff}</b></p></div>

  <div class="kpi" style="border:1px solid #fecaca"><div class="lbl" style="font-weight:700;margin-bottom:8px;color:var(--red)"> ເຂດອັນຕະລາຍ</div>
    <button class="btn-ok" style="background:var(--red);padding:10px 18px;border-radius:11px;font-weight:700" onclick="confirmReset()"> ລ້າງຂໍ້ມູນທັງໝົດ</button></div></div>`;}
function saveSettings(){state.shopName=document.getElementById('ad_name').value||'ST POS';state.serviceChargePct=+document.getElementById('ad_svc').value||0;state.vatPct=+document.getElementById('ad_vat').value||0;state.billDiscPct=+document.getElementById('ad_disc').value||0;state.qrGlobal=document.getElementById('ad_qr').checked;state.soundOn=document.getElementById('ad_snd').checked;save();render();showSuccess('ບັນທຶກການຕັ້ງຄ່າແລ້ວ!');}
function addFloor(){openModal(`<h2> ເພີ່ມຊັ້ນ</h2><label>ຊື່ຊັ້ນ</label><input id="fn" placeholder="ເຊັ່ນ ຊັ້ນ4 / ລະບຽງ"><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button><button class="btn-ok" onclick="doAddFloor()">ເພີ່ມ</button></div>`);}
function doAddFloor(){const v=(document.getElementById('fn').value||'').trim();if(!v){toast('ໃສ່ຊື່ຊັ້ນ');return;}if(state.floors.includes(v)){toast('ຊັ້ນຊ້ຳ');return;}state.floors.push(v);save();closeModal();render();showSuccess('ເພີ່ມຊັ້ນສຳເລັດ!',v);}
function removeFloor(name){const used=Object.values(state.tables).some(t=>t.floor===name);if(used){toast('ມີໂຕະຢູ່ຊັ້ນນີ້ — ຍ້າຍ/ລຶບໂຕະກ່ອນ');return;}state.floors=state.floors.filter(f=>f!==name);save();render();toast('ລຶບຊັ້ນ '+name);}
function addTablePrompt(){if(!state.floors.length){toast('ເພີ່ມຊັ້ນກ່ອນ');return;}openModal(`<h2> ເພີ່ມໂຕະ</h2><label>ຊື່ໂຕະ</label><input id="tn" placeholder="ເຊັ່ນ A9 / VIP1"><label>ຊັ້ນ</label><select id="tf">${state.floors.map(f=>`<option>${f}</option>`).join('')}</select><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button><button class="btn-ok" onclick="doAddTable()">ເພີ່ມ</button></div>`);}
function doAddTable(){const nm=(document.getElementById('tn').value||'').trim();if(!nm){toast('ໃສ່ຊື່ໂຕະ');return;}if(state.tables[nm]){toast('ຊື່ໂຕະຊ້ຳ');return;}state.tables[nm]={name:nm,floor:document.getElementById('tf').value,status:'free',items:[],customer:null,main:false,mergedInto:null};save();closeModal();render();showSuccess('ເພີ່ມໂຕະສຳເລັດ!',nm);}
function removeTable(name){const t=state.tables[name];if(t.status!=='free'){toast('ໂຕະບໍ່ວ່າງ — ປິດບິນ/ຍົກເລີກກ່ອນ');return;}openModal(`<h2>ລຶບໂຕະ ${name}?</h2><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ບໍ່</button><button class="btn-ok" style="background:var(--red)" onclick="doRemoveTable('${name.replace(/'/g,"\\'")}')">ລຶບ</button></div>`);}
function doRemoveTable(name){delete state.tables[name];delete state.qr[name];save();closeModal();render();toast('ລຶບໂຕະ '+name);}
function setMenuImage(code){const cur=state.menuImg[code]||'';openModal(`<h2> ຮູບເມນູ ${code}</h2><label>ລິ້ງ URL ຮູບ (ແນະນຳ 400×400px, 200KB)</label><input id="mi" value="${cur.replace(/"/g,'&quot;')}" placeholder="https://..."><p style="font-size:12px;color:var(--muted);margin-top:6px">ວ່າງໄວ້ = ໃຊ້ໄອຄອນ emoji</p><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button><button class="btn-ok" onclick="doSetMenuImage('${code}')">ບັນທຶກ</button></div>`);}
function doSetMenuImage(code){const u=(document.getElementById('mi').value||'').trim();if(u)state.menuImg[code]=u;else delete state.menuImg[code];save();closeModal();render();showSuccess('ບັນທຶກຮູບແລ້ວ!',code);}
function addShift(){openModal(`<h2> ເພີ່ມກະ</h2><input id="sh" placeholder="ເຊັ່ນ ກະດຶກ"><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button><button class="btn-ok" onclick="doAddShift()">ເພີ່ມ</button></div>`);}
function doAddShift(){const v=(document.getElementById('sh').value||'').trim();if(!v){toast('ໃສ່ຊື່ກະ');return;}if(state.shifts.includes(v)){toast('ກະຊ້ຳ');return;}state.shifts.push(v);save();closeModal();render();showSuccess('ເພີ່ມກະສຳເລັດ!',v);}
function removeShift(name){if(state.shifts.length<=1){toast('ຕ້ອງມີຢ່າງໜ້ອຍ 1 ກະ');return;}state.shifts=state.shifts.filter(s=>s!==name);if(state.activeShift===name)state.activeShift=state.shifts[0];save();render();toast('ລຶບກະ '+name);}
function addStaff(){openModal(`<h2> ເພີ່ມພະນັກງານ</h2><input id="stf" placeholder="ຊື່ພະນັກງານ"><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button><button class="btn-ok" onclick="doAddStaff()">ເພີ່ມ</button></div>`);}
function doAddStaff(){const v=(document.getElementById('stf').value||'').trim();if(!v){toast('ໃສ່ຊື່');return;}if(state.staff.includes(v)){toast('ຊື່ຊ້ຳ');return;}state.staff.push(v);save();closeModal();render();showSuccess('ເພີ່ມພະນັກງານສຳເລັດ!',v);}
function removeStaff(name){if(state.staff.length<=1){toast('ຕ້ອງມີຢ່າງໜ້ອຍ 1 ຄົນ');return;}state.staff=state.staff.filter(s=>s!==name);if(state.activeStaff===name)state.activeStaff=state.staff[0];save();render();toast('ລຶບ '+name);}
function confirmReset(){openModal(`<h2> ລ້າງຂໍ້ມູນທັງໝົດ?</h2><p style="font-size:14px;text-align:center;color:var(--muted)">ກັບคืนບໍ່ໄດ້</p><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ຍົກເລີກ</button><button class="btn-ok" style="background:var(--red)" onclick="doReset()">ລ້າງເລີຍ</button></div>`);}
function doReset(){const nm=state.shopName;state=freshState();state.shopName=nm;save();closeModal();setView('tables');showSuccess('ລ້າງຂໍ້ມູນສຳເລັດ!');}
function openModal(h){document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${h}</div></div>`;}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}
/* ===== RECEIPT / PRINT ===== */
var __rcptHTML='';
function recDate(ts){var d=new Date(ts);function p(n){return (n<10?'0':'')+n;}return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());}
function buildReceiptHTML(b){
 var sub=b.items.reduce(function(s,i){return s+lineTotal(i);},0);
 var adj=Math.round(b.total-sub);
 var w58=(+state.paperW===58);
 var logo=state.shopLogo?('<img class="logo" src="'+state.shopLogo+'">'):'';
 var items=b.items.map(function(i){var unit=(i.price+(i.modPrice||0));return '<div class="it"><div class="ln"><span class="nm">'+i.name+'</span><span>'+KIP(lineTotal(i))+'</span></div><div class="q">'+i.qty+' x '+KIP(unit)+(i.disc?(' -'+i.disc+'%'):'')+'</div></div>';}).join('');
 var cur='';
 if(state.rateTHB){cur+='<div class="cur"><span>ລວມ (THB &#3647;)</span><b>'+(b.total/state.rateTHB).toFixed(2)+'</b></div><div class="sm" style="text-align:right;color:#555">1 &#3647; = '+KIP(state.rateTHB)+' ກີບ</div>';}
 if(state.rateUSD){cur+='<div class="cur" style="margin-top:2px"><span>ລວມ (USD $)</span><b>'+(b.total/state.rateUSD).toFixed(2)+'</b></div><div class="sm" style="text-align:right;color:#555">1 $ = '+KIP(state.rateUSD)+' ກີບ</div>';}
 return '<div class="rcpt'+(w58?' w58':'')+'">'+
  '<div class="ctr">'+logo+(state.shopLogo?'':'<div class="lgtxt">'+(state.shopName||'ST POS')+'</div>')+
  '<div class="shop">'+(state.shopName||'')+'</div>'+
  (state.shopAddr?'<div class="sm">'+state.shopAddr+'</div>':'')+
  (state.shopPhone?'<div class="sm">ໂທ: '+state.shopPhone+'</div>':'')+'</div>'+
  '<div class="ttl">ໃບຮັບເງິນ ('+b.pay+')</div>'+
  '<div class="dash"></div>'+
  '<div class="meta"><span>ເລກທີ: '+b.receipt+'</span></div>'+
  '<div class="meta"><span>ວັນທີ: '+recDate(b.ts)+'</span></div>'+
  '<div class="meta"><span>ໂຕະ: '+b.table+'</span><span>'+(b.cashier||'')+'</span></div>'+
  '<div class="dash"></div>'+items+'<div class="dash"></div>'+
  '<div class="row"><span>ຍອດລວມ</span><span>'+KIP(sub)+'</span></div>'+
  (adj?'<div class="row"><span>Service / VAT / ສ່ວນຫຼຸດ</span><span>'+(adj>0?'+':'')+KIP(adj)+'</span></div>':'')+
  '<div class="dash"></div>'+
  '<div class="row grand"><span>ສຸດທິ (LAK)</span><span>'+KIP(b.total)+'</span></div>'+
  '<div class="dash"></div>'+cur+
  '<div class="foot">ຂອບໃຈທີ່ໃຊ້ບໍລິການ<br>Thank you</div></div>';
}
function printHTML(html){__rcptHTML=html;document.getElementById('printArea').innerHTML=html;setTimeout(function(){window.print();},150);}
function printLast(){if(__rcptHTML)printHTML(__rcptHTML);}
function printReceipt(rno){var b=(state.bills||[]).find(function(x){return x.receipt===rno;});if(!b){toast('ບໍ່ພົບບິນ');return;}printHTML(buildReceiptHTML(b));}
function previewReceipt(rno){var b=(state.bills||[]).find(function(x){return x.receipt===rno;});if(!b){toast('ບໍ່ພົບບິນ');return;}__rcptHTML=buildReceiptHTML(b);openModal('<h2>ໃບບິນ '+rno+'</h2><div style="text-align:center;max-height:58vh;overflow:auto;background:#f1f5f9;padding:10px;border-radius:10px"><div class="rcpt-prev">'+__rcptHTML+'</div></div><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ປິດ</button><button class="btn-ok grad" onclick="printLast()"> ພິມ</button></div>');}
function showPaidModal(rno,chg,pay){document.getElementById('modalRoot').innerHTML='<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal success"><div class="checkwrap"><svg viewBox="0 0 52 52"><circle cx="26" cy="26" r="24"/><path d="M14 27l8 7 16-17"/></svg></div><h2>ຊຳລະສຳເລັດ!</h2><p class="ssub">ບິນ '+rno+' · '+pay+' · ເງິນທອນ '+KIP(chg)+' ກີບ</p><div class="modal-btns" style="margin-top:14px"><button class="btn-cancel" onclick="closeModal()">ປິດ</button><button class="btn-ok grad" onclick="previewReceipt(\''+rno+'\')"> ພິມໃບບິນ</button></div></div></div>';}
function loadLogo(inp){var f=inp.files&&inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var mx=260,sc=Math.min(1,mx/img.width);var c=document.createElement('canvas');c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);state.shopLogo=c.toDataURL('image/png');save();render();showSuccess('ປ່ຽນໂລໂກ້ແລ້ວ!');};img.src=e.target.result;};r.readAsDataURL(f);}
function removeLogo(){state.shopLogo='';save();render();toast('ລຶບໂລໂກ້ແລ້ວ');}
function saveReceiptSettings(){state.shopAddr=document.getElementById('ad_addr').value||'';state.shopPhone=document.getElementById('ad_phone').value||'';state.rateTHB=+document.getElementById('ad_thb').value||0;state.rateUSD=+document.getElementById('ad_usd').value||0;state.paperW=+document.getElementById('ad_paper').value||80;save();render();showSuccess('ບັນທຶກໃບບິນແລ້ວ!');}
function testPrint(){var demo={receipt:String(state.receiptSeq+1).padStart(10,'0'),table:'A1',items:[{name:'Iced Latte 16oz',price:55000,qty:1,modPrice:0,disc:0},{name:'Frappe Matcha 16oz',price:85000,qty:2,modPrice:0,disc:0}],total:225000,pay:'ເງິນສົດ',cashier:state.activeShift+' - '+state.activeStaff,ts:Date.now()};__rcptHTML=buildReceiptHTML(demo);openModal('<h2>ຕົວຢ່າງໃບບິນ</h2><div style="text-align:center;max-height:58vh;overflow:auto;background:#f1f5f9;padding:10px;border-radius:10px"><div class="rcpt-prev">'+__rcptHTML+'</div></div><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">ປິດ</button><button class="btn-ok grad" onclick="printLast()"> ພິມ</button></div>');}
function showSuccess(title,sub){document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal success"><div class="checkwrap"><svg viewBox="0 0 52 52"><circle cx="26" cy="26" r="24"/><path d="M14 27l8 7 16-17"/></svg></div><h2>${title}</h2>${sub?`<p class="ssub">${sub}</p>`:''}<button class="btn-ok grad" style="margin-top:16px;width:100%;padding:12px;border-radius:11px;font-weight:700" onclick="closeModal()">ຕົກລົງ</button></div></div>`;clearTimeout(window.__sx);window.__sx=setTimeout(()=>{if(document.querySelector('.modal.success'))closeModal();},2600);}
function toast(m){const r=document.getElementById('toastRoot');r.innerHTML=`<div class="toast">${m}</div>`;clearTimeout(window.__t);window.__t=setTimeout(()=>r.innerHTML='',3200);}
boot();
</script>
</body>
</html>
